name: Go Lint & Test

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
  
env:
  go-version: '1.25'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.go-version }}
          cache-dependency-path: "go.sum"

      - name: Check format
        run: gofmt -s -l . && [ $(gofmt -s -l . | wc -l) -eq 0 ]

      - name: Run vet
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.go-version }}
          cache-dependency-path: "go.sum"

      - name: Run tests
        run: go test -v ./...
